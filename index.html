<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY HUB</title>
    
    <!-- Favicon Condizente -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%231a1a2e%22/><path d=%22M30 30h40v40H30z%22 fill=%22none%22 stroke=%22white%22 stroke-width=%228%22/><path d=%22M50 20v20M50 60v20M20 50h20M60 50h20%22 stroke=%22white%22 stroke-width=%228%22 stroke-linecap=%22round%22/></svg>">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['"Playfair Display"', 'serif'],
                    },
                    colors: {
                        deep: '#0a0a12',
                    }
                }
            }
        }
    </script>

    <style>
        /* Base styles & Gradiente radial profundo */
        body, html {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: radial-gradient(circle at center, #0a0a12 0%, #000 100%);
            color: #fff;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Fixed Canvas */
        #starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Glassmorphism utility */
        .glass-card {
            background: rgba(255, 255, 255, 0.015);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: all 0.7s cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* Efeito de Brilho (Shimmer/Glint) */
        .glass-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: -150%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                120deg,
                transparent,
                rgba(255, 255, 255, 0.08),
                transparent
            );
            transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 20;
            pointer-events: none;
        }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.05), inset 0 0 20px rgba(255, 255, 255, 0.02);
        }

        .glass-card:hover::before {
            left: 150%;
        }

        /* Custom scrollbar deep theme */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #1a1a2e; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #2a2a4e; }

        /* Modal Animation State */
        #edit-modal, #admin-modal, #notification-modal {
            transition: opacity 0.2s cubic-bezier(0.19, 1, 0.22, 1);
        }
        #edit-modal > div, #admin-modal > div, #notification-modal > div {
            transition: transform 0.2s cubic-bezier(0.19, 1, 0.22, 1);
            transform: scale(0.95);
        }
        #edit-modal.modal-visible, #admin-modal.modal-visible, #notification-modal.modal-visible {
            opacity: 1 !important;
        }
        #edit-modal.modal-visible > div, #admin-modal.modal-visible > div, #notification-modal.modal-visible > div {
            transform: scale(1);
        }
    </style>
</head>
<body class="relative flex flex-col items-center">

    <!-- Canvas Background -->
    <canvas id="starfield"></canvas>

    <!-- Admin Toggle Button -->
    <button onclick="toggleAdminMode()" class="fixed top-6 right-6 z-50 p-2 glass-card border border-white/10 rounded-full opacity-30 hover:opacity-100 transition-all group" title="Acesso Administrativo">
        <svg id="lock-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white">
            <!-- Icon changes dynamically via JS -->
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
    </button>

    <!-- Header Section -->
    <header class="relative z-10 w-full max-w-[1024px] flex flex-col items-center mt-[100px] px-6">
        <div class="relative py-8 px-16 flex flex-col items-center">
            <!-- Decorative Accent Lines (Always Active) -->
            <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-[1px] bg-gradient-to-r from-transparent via-white/40 to-transparent"></div>
            
            <!-- Classic Title with refined tracking and glow -->
            <h1 class="font-serif text-[44px] md:text-[52px] font-bold tracking-[20px] uppercase text-white drop-shadow-[0_0_45px_rgba(255,255,255,0.15)] text-center ml-[20px]">
                MY HUB
            </h1>

            <!-- Latin Motto (Compact) -->
            <div class="mt-4 opacity-90">
                <span class="font-serif text-[13px] uppercase tracking-tight italic text-white font-semibold">Fortis Fortuna Adiuvat</span>
            </div>

            <div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-full h-[1px] bg-gradient-to-r from-transparent via-white/40 to-transparent"></div>
        </div>
    </header>

    <!-- Main Content Grid -->
    <main class="relative z-10 w-full max-w-[1024px] px-6 my-12 flex-1 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pb-20" id="projects-grid">
        <!-- Cards injected by script -->
    </main>

    <!-- Edit Modal -->
    <div id="edit-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-6 bg-black/80 backdrop-blur-md opacity-0">
        <div class="glass-card border border-white/10 w-full max-w-lg p-10 rounded-xl shadow-[0_0_80px_rgba(0,0,0,0.6)] relative overflow-hidden">
            <!-- Decorative Header Accent -->
            <div class="absolute top-0 left-0 w-full h-[2px] bg-gradient-to-r from-transparent via-white/20 to-transparent"></div>
            
            <!-- Close Button -->
            <button onclick="closeEditModal()" class="absolute top-6 right-6 text-white/30 hover:text-white transition-colors p-2">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>

            <h3 class="font-serif text-3xl mb-8 text-white tracking-[4px] uppercase italic text-center">Gerenciar Projeto</h3>
            
            <div class="space-y-4">
                <div class="group/field">
                    <label class="block text-[9px] uppercase tracking-[3px] text-white/30 mb-2 group-focus-within/field:text-white/60 transition-colors">Título do Projeto</label>
                    <input type="text" id="modal-input-title" class="w-full bg-white/5 border border-white/10 rounded-[4px] p-4 text-white focus:outline-none focus:border-white/40 focus:bg-white/10 transition-all font-sans text-sm" placeholder="Nome do sistema...">
                </div>
                <div class="group/field">
                    <label class="block text-[9px] uppercase tracking-[3px] text-white/30 mb-2 group-focus-within/field:text-white/60 transition-colors">Descrição / Legenda</label>
                    <textarea id="modal-input-desc" rows="4" class="w-full bg-white/5 border border-white/10 rounded-[4px] p-4 text-white focus:outline-none focus:border-white/40 focus:bg-white/10 transition-all font-sans text-sm resize-none" placeholder="O que este projeto faz?"></textarea>
                </div>
                <div class="group/field">
                    <label class="block text-[9px] uppercase tracking-[3px] text-white/30 mb-2 group-focus-within/field:text-white/60 transition-colors">URL do Projeto</label>
                    <input type="text" id="modal-input-link" class="w-full bg-white/5 border border-white/10 rounded-[4px] p-4 text-white focus:outline-none focus:border-white/40 focus:bg-white/10 transition-all font-sans text-sm" placeholder="https://...">
                </div>
                <div class="group/field">
                    <label class="block text-[9px] uppercase tracking-[3px] text-white/30 mb-2 group-focus-within/field:text-white/60 transition-colors">Status Operacional</label>
                    <select id="modal-input-status" class="w-full bg-[#0a0a12] border border-white/10 rounded-[4px] p-4 text-white focus:outline-none focus:border-white/40 focus:bg-white/10 transition-all font-sans text-sm appearance-none cursor-pointer">
                        <option value="">— Sem Status —</option>
                        <option value="finalizado" class="bg-black">Finalizado</option>
                        <option value="finalizando" class="bg-black">Finalizando</option>
                    </select>
                </div>
            </div>

            <div class="flex flex-col sm:flex-row justify-center gap-6 mt-10">
                <button onclick="closeEditModal()" class="px-8 py-3 text-[10px] uppercase tracking-[3px] text-white/40 hover:text-white transition-colors border border-transparent hover:border-white/10 rounded-[4px]">Descartar</button>
                <button onclick="saveModalChanges()" class="px-12 py-3 bg-white text-black text-[10px] uppercase tracking-[3px] font-bold hover:bg-white/90 transition-all rounded-[4px] shadow-[0_10px_20px_rgba(255,255,255,0.1)]">Confirmar</button>
            </div>
        </div>
    </div>

    <!-- Admin Password Modal -->
    <div id="admin-modal" class="fixed inset-0 z-[110] hidden items-center justify-center p-6 bg-black/80 backdrop-blur-md opacity-0">
        <div class="glass-card border border-white/10 w-full max-w-sm p-10 rounded-xl shadow-[0_0_80px_rgba(0,0,0,0.6)] relative overflow-hidden text-center">
            <div class="absolute top-0 left-0 w-full h-[2px] bg-gradient-to-r from-transparent via-white/20 to-transparent"></div>
            
            <button onclick="closeAdminModal()" class="absolute top-6 right-6 text-white/30 hover:text-white transition-colors p-2">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>

            <h3 class="font-serif text-2xl mb-8 text-white tracking-[4px] uppercase italic">Acesso Restrito</h3>
            
            <div class="space-y-6">
                <div class="group/field">
                    <label class="block text-[9px] uppercase tracking-[3px] text-white/30 mb-4 group-focus-within/field:text-white/60 transition-colors">Senha de Administrador</label>
                    <input type="password" id="admin-password-input" 
                        onkeydown="if(event.key === 'Enter') verifyAdminPassword()"
                        class="w-full bg-white/5 border border-white/10 rounded-[4px] p-4 text-white focus:outline-none focus:border-white/40 focus:bg-white/10 transition-all font-sans text-sm text-center tracking-[8px]" 
                        placeholder="••••">
                </div>
                
                <button onclick="verifyAdminPassword()" class="w-full py-4 bg-white text-black text-[10px] uppercase tracking-[3px] font-bold hover:bg-white/90 transition-all rounded-[4px] shadow-[0_10px_20px_rgba(255,255,255,0.1)]">
                    Desbloquear
                </button>
            </div>
        </div>
    </div>

    <!-- Notification Modal (Feedback) -->
    <div id="notification-modal" class="fixed inset-0 z-[150] hidden items-center justify-center p-6 bg-black/60 backdrop-blur-sm opacity-0">
        <div class="glass-card border border-white/10 w-full max-w-xs p-8 rounded-xl shadow-2xl relative text-center">
            <div id="notification-icon" class="mb-4 flex justify-center"></div>
            <p id="notification-text" class="text-white font-sans text-sm tracking-wide"></p>
        </div>
    </div>

    <!-- Hidden File Input for Image Upload -->
    <input type="file" id="global-image-input" class="hidden" accept="image/*">

    <script>
        // --- 1. DATA DEFINITION --- //
        // IMPORTANTE: Crie uma pasta chamada "img" na raiz do seu projeto.
        // Coloque suas imagens dentro dela e certifique-se de que os nomes abaixo 
        // coincidam exatamente com os arquivos (ex: foto.jpg é diferente de FOTO.JPG).
        
        const defaultProjects = [
            { id: 0, title: "Controle de Entrega de Materiais 2026", desc: "Dashboard analítico para monitoramento de registros e itens críticos, com visualização em tempo real do status operacional e disponibilidade de materiais.", link: "https://controleentregamateriaisldc.vercel.app/", image: "./img/controle_materiais.png", status: "finalizado", isPlaceholder: false },
            { id: 1, title: "Controle Solicitação de Recurso", desc: "Gestão de horas trabalhadas e alocação de equipamentos, integrando indicadores de produtividade e registros detalhados por colaborador.", link: "https://controlesolicitacaoldc.vercel.app/", image: "./img/controle_recursos.png", status: "finalizado", isPlaceholder: false },
            { id: 2, title: "LDC ToolFlow",          desc: "Sistema de inventário operacional para controle de ativos e ferramentaria, com rastreamento de uso e gestão de manutenção preventiva.", link: "", image: "./img/toolflow.png", status: "finalizando", isPlaceholder: false },
            { id: 3, title: "Colaboradores - LOTO",  desc: "Plataforma para gestão de segurança e identificação de colaboradores em procedimentos de Lockout/Tagout (LOTO) em áreas de risco.", link: "https://cartaolotoldc.vercel.app/", image: "./img/lotocard.png", status: "finalizado", isPlaceholder: false },
            { id: 4, title: "STOCK v2",              desc: "Catálogo técnico avançado com busca inteligente para gestão de estoque de milhares de itens, incluindo valores unitários e localização física.", link: "https://ldcstockv2.vercel.app/", image: "./img/stockv2.png", status: "finalizado", isPlaceholder: false },
            
            // Para adicionar um novo card manualmente, basta duplicar um dos blocos acima aqui.
            
            { id: 99, title: "Em Desenvolvimento",    desc: "", link: "#", image: "", status: null, isPlaceholder: true }
        ];

        // Load from LocalStorage or use default
        let projectsData = JSON.parse(localStorage.getItem('myHubData')) || defaultProjects;

        // Admin State Management
        // Senha configurada: "0000" (Altere na função verifyAdminPassword abaixo)
        let isAdmin = sessionStorage.getItem('hubAdminAuthenticated') === 'true';
        updateLockIcon();

        function saveToStorage() {
            localStorage.setItem('myHubData', JSON.stringify(projectsData));
        }

        // --- 2. RENDER CARDS --- //
        const grid = document.getElementById('projects-grid');
        
        function renderCards() {
            grid.innerHTML = '';
            projectsData.forEach((p) => {
                const isDeveloping = p.isPlaceholder;
                const card = document.createElement(isDeveloping ? 'div' : 'a');
                if (!isDeveloping) {
                    card.href = p.link;
                    card.target = "_blank";
                    card.rel = "noopener noreferrer";
                }

                card.className = `flex flex-col glass-card border border-white/5 rounded-[2px] overflow-hidden w-full min-h-[380px] relative group ${isDeveloping ? 'cursor-default' : 'cursor-pointer hover:-translate-y-3 hover:border-white/30'}`;

                card.innerHTML = `
                ${isAdmin ? `
                    <!-- Edit Controls - Only visible for Admin -->
                    <div class="absolute top-3 right-3 flex gap-2 z-30 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="editCardTitle(${p.id}, event)" class="p-1.5 bg-black/40 backdrop-blur-md border border-white/10 rounded-full hover:bg-white/20 transition-all text-white/70 hover:text-white" title="Editar Nome">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        </button>
                        <button onclick="triggerImageUpload(${p.id}, event)" class="p-1.5 bg-black/40 backdrop-blur-md border border-white/10 rounded-full hover:bg-white/20 transition-all text-white/70 hover:text-white" title="Alterar Capa">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                        </button>
                    </div>
                ` : ''}

                <!-- HTML Parte Superior: Upload de Imagem (50%) -->
                <div class="h-1/2 min-h-[180px] relative bg-black/20 flex items-center justify-center border-b border-white/10 overflow-hidden">
                    
                    ${isDeveloping ? `
                        <div class="absolute inset-0 flex items-center justify-center z-20 pointer-events-none">
                            <span class="text-white/20 text-[18px] font-bold uppercase tracking-[4px] rotate-[45deg] whitespace-nowrap select-none">
                                Em desenvolvimento
                            </span>
                        </div>
                    ` : ''}

                    <!-- Image Container -->
                    <img id="img-src-${p.id}" class="absolute inset-0 w-full h-full object-cover transition-transform duration-[1.5s] ease-out group-hover:scale-105 hidden" alt="${p.title}">
                    
                    <!-- Empty State Placeholder -->
                    <div id="placeholder-${p.id}" class="flex flex-col items-center gap-2 opacity-50 transition-opacity">
                        ${!isDeveloping ? `
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="text-white">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                                <circle cx="8.5" cy="8.5" r="1.5"/>
                                <polyline points="21 15 16 10 5 21"/>
                            </svg>
                            <span class="text-[10px] text-white tracking-[2px] uppercase font-sans">Sem imagem</span>
                        ` : ''}
                    </div>

                </div>

                <!-- HTML Parte Inferior: Conteúdo do Projeto (50%) -->
                <div class="h-1/2 p-[20px] flex flex-col justify-between">
                    <div>
                        <h2 class="font-serif text-[18px] mb-[12px] text-white/80 group-hover:text-white transition-colors duration-500 text-center tracking-[2px] uppercase italic font-light">${p.title}</h2>
                        <p class="font-sans text-[11px] text-white/40 text-justify font-light leading-[1.8] tracking-wide group-hover:text-white/60 transition-colors duration-500">
                            ${p.desc}
                        </p>
                    </div>

                    <!-- Status Tag (Centralizada na parte inferior) -->
                    ${p.status ? `
                        <div class="flex justify-center mt-4">
                            <span class="px-3 py-1 rounded-[2px] text-[8px] uppercase tracking-[2px] font-medium border backdrop-blur-md transition-colors duration-500
                                ${p.status === 'finalizado' ? 'text-emerald-400 border-emerald-400/20 bg-emerald-400/5 group-hover:bg-emerald-400/10' : 'text-amber-500 border-amber-500/20 bg-amber-500/5 group-hover:bg-amber-500/10'}">
                                ${p.status}
                            </span>
                        </div>
                    ` : ''}
                </div>
                `;
                grid.appendChild(card);
                loadImageFromData(p);
            });

            // Add New Card Button (HUD style with + icon)
            if (isAdmin) {
                const addCard = document.createElement('div');
                addCard.onclick = openAddModal;
                addCard.className = `flex flex-col glass-card border border-white/10 border-dashed rounded-[2px] overflow-hidden w-full min-h-[380px] cursor-pointer hover:-translate-y-3 hover:border-white/40 items-center justify-center group transition-all duration-500`;
                addCard.innerHTML = `
                    <div class="flex flex-col items-center gap-4 opacity-30 group-hover:opacity-100 transition-all duration-700">
                        <div class="w-16 h-16 rounded-full border border-white/40 flex items-center justify-center group-hover:border-white group-hover:scale-110 transition-all">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        </div>
                        <span class="text-[10px] uppercase tracking-[5px] font-bold italic font-serif">Adicionar Projeto</span>
                    </div>
                `;
                grid.appendChild(addCard);
            }
        }

        // Initial render
        renderCards();

        // --- 2.2 ADMIN LOGIC --- //
        function toggleAdminMode() {
            if (!isAdmin) {
                openAdminModal();
            } else {
                isAdmin = false;
                sessionStorage.removeItem('hubAdminAuthenticated');
                updateLockIcon();
                renderCards();
                showNotification("Modo Edição Desativado.", false, 600);
            }
        }

        function openAdminModal() {
            const modal = document.getElementById('admin-modal');
            const input = document.getElementById('admin-password-input');
            input.value = '';
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => modal.classList.add('modal-visible'), 10);
            input.focus();
        }

        function closeAdminModal() {
            const modal = document.getElementById('admin-modal');
            modal.classList.remove('modal-visible');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 200);
        }

        function verifyAdminPassword() {
            const input = document.getElementById('admin-password-input');
            const pass = input.value;
            // DICA: Mude '0000' para a senha de sua preferência
            if (pass === "0000") {
                isAdmin = true;
                sessionStorage.setItem('hubAdminAuthenticated', 'true');
                closeAdminModal();
                updateLockIcon();
                renderCards();
                showNotification("Modo Edição Ativado.", false, 600);
            } else {
                showNotification("Senha incorreta.", true, 1200);
                input.value = '';
                input.focus();
            }
        }

    function showNotification(message, isError = false, duration = 0) {
            const modal = document.getElementById('notification-modal');
            const text = document.getElementById('notification-text');
            const icon = document.getElementById('notification-icon');
            
            text.innerText = message;
            icon.innerHTML = isError ? 
                '<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>' :
                '<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>';

            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => {
                modal.classList.add('modal-visible');
            }, 10);

            if (duration > 0) {
                setTimeout(() => {
                    closeNotification();
                }, duration);
            }
        }

        function closeNotification() {
            const modal = document.getElementById('notification-modal');
            modal.classList.remove('modal-visible');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 200);
        }

        function updateLockIcon() {
            const icon = document.getElementById('lock-icon');
            if (isAdmin) {
                icon.innerHTML = '<path d="M7 11V7a5 5 0 0 1 9.9-1"></path><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>';
                icon.classList.add('text-emerald-400');
            } else {
                icon.innerHTML = '<rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path>';
                icon.classList.remove('text-emerald-400');
            }
        }

        // --- 2.5 EDIT LOGIC --- //
        let activeEditId = null;
        const fileInput = document.getElementById('global-image-input');

        fileInput.addEventListener('change', (e) => {
            if (!isAdmin) return;
            const file = e.target.files[0];
            if (file && activeEditId !== null) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const dataUrl = event.target.result;
                    const project = projectsData.find(proj => proj.id === activeEditId);
                    if (project) {
                        project.image = dataUrl;
                        if (project.isPlaceholder) project.isPlaceholder = false;
                        saveToStorage();
                        renderCards();
                    }
                };
                reader.readAsDataURL(file);
            }
        });

        window.triggerImageUpload = (id, e) => {
            if (!isAdmin) return;
            e.preventDefault();
            e.stopPropagation();
            activeEditId = id;
            fileInput.click();
        };

        let currentEditingId = null;

        window.editCardTitle = (id, e) => {
            if (!isAdmin) return;
            e.preventDefault();
            e.stopPropagation();
            currentEditingId = id;
            const project = projectsData.find(proj => proj.id === id);
            
            document.getElementById('modal-input-title').value = project.title;
            document.getElementById('modal-input-desc').value = project.desc || "";
            document.getElementById('modal-input-status').value = project.status || "";
            document.getElementById('modal-input-link').value = project.link || "";
            const modal = document.getElementById('edit-modal');
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => modal.classList.add('modal-visible'), 10);
            document.getElementById('modal-input-title').focus();
        };

        window.openAddModal = () => {
            if (!isAdmin) return;
            currentEditingId = null; // Indica novo projeto
            
            document.getElementById('modal-input-title').value = "";
            document.getElementById('modal-input-desc').value = "";
            document.getElementById('modal-input-status').value = "";
            document.getElementById('modal-input-link').value = "";
            
            const modal = document.getElementById('edit-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => modal.classList.add('modal-visible'), 10);
            document.getElementById('modal-input-title').focus();
        };

        window.closeEditModal = () => {
            const modal = document.getElementById('edit-modal');
            modal.classList.remove('modal-visible');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 200);
            currentEditingId = null;
        };

        window.saveModalChanges = () => {
            if (!isAdmin) return closeEditModal();
            const newTitle = document.getElementById('modal-input-title').value;
            const newDesc = document.getElementById('modal-input-desc').value;
            const newStatus = document.getElementById('modal-input-status').value;
            const newLink = document.getElementById('modal-input-link').value;

            if (newTitle && newTitle.trim() !== "") {
                if (currentEditingId !== null) {
                    // Modo Edição
                    const project = projectsData.find(proj => proj.id === currentEditingId);
                    if (project) {
                        project.title = newTitle;
                        project.desc = newDesc;
                        project.status = newStatus || null;
                        project.link = newLink;
                        if (project.isPlaceholder) project.isPlaceholder = false;
                    }
                } else {
                    // Modo Criação
                    const nextId = projectsData.length > 0 ? Math.max(...projectsData.map(p => p.id)) + 1 : 0;
                    const newProject = {
                        id: nextId,
                        title: newTitle,
                        desc: newDesc,
                        link: newLink,
                        image: "",
                        status: newStatus || null,
                        isPlaceholder: false
                    };
                    // Insere antes do placeholder "Em Desenvolvimento"
                    const devIndex = projectsData.findIndex(p => p.isPlaceholder);
                    if (devIndex !== -1) {
                        projectsData.splice(devIndex, 0, newProject);
                    } else {
                        projectsData.push(newProject);
                    }
                }
                saveToStorage();
                renderCards();
            }
            closeEditModal();
        };

        // --- 3. CARREGAMENTO DE IMAGENS --- //
        function loadImageFromData(p) {
            // Carrega a imagem diretamente do objeto projectsData
            if (p.image) {
                renderImage(p.id, p.image);
            } else {
                // Se não houver imagem definida, mostra o placeholder
                const placeholder = document.getElementById(`placeholder-${p.id}`);
                const imgElement = document.getElementById(`img-src-${p.id}`);
                placeholder.style.display = 'flex'; // Garante que o placeholder esteja visível
                imgElement.classList.add('hidden'); // Garante que a imagem esteja oculta
            }
        }

        function renderImage(id, dataUrl) {
            const imgElement = document.getElementById(`img-src-${id}`);
            const placeholder = document.getElementById(`placeholder-${id}`);
            imgElement.src = dataUrl;
            imgElement.classList.remove('hidden');
            placeholder.style.display = 'none'; // Esconde placeholder se houver imagem
        }

        // --- 4. GALAXY CANVAS ANIMATION --- //
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        const stars = [];
        const shootingStars = [];

        function resizeCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Start populate 250 stars
        for(let i = 0; i < 250; i++) {
            stars.push({
                x: Math.random() * width,
                y: Math.random() * height,
                radius: Math.random() * 1.2 + 0.1,
                // ~30% das estrelas movem-se de baixo para cima
                speedY: Math.random() > 0.7 ? (Math.random() * 0.2 + 0.05) : 0, 
                alpha: Math.random() * 0.8 + 0.2,
                twinkleSpeed: (Math.random() - 0.5) * 0.02
            });
        }

        function spawnShootingStar() {
            shootingStars.push({
                x: Math.random() * width * 0.8, // Inicia mais à esquerda e na parte superior
                y: Math.random() * height * 0.3,
                length: Math.random() * 80 + 40,
                speedX: Math.random() * 6 + 4,
                speedY: Math.random() * 6 + 4,
                alpha: 1
            });
            // Randomiza tempo da próxima estrela (entre 5 e 10 segundos)
            const nextSpawn = Math.random() * 5000 + 5000;
            setTimeout(spawnShootingStar, nextSpawn);
        }
        setTimeout(spawnShootingStar, Math.random() * 3000); // 1ª Estrela cadente rápida

        function drawGalaxy() {
            ctx.clearRect(0, 0, width, height);

            // Desenho das estrelas normais e móveis
            stars.forEach(star => {
                ctx.globalAlpha = star.alpha;
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                ctx.fill();

                if (star.speedY > 0) {
                    star.y -= star.speedY; // Move subir (bottom-up)
                    if (star.y < 0) {
                        star.y = height;
                        star.x = Math.random() * width;
                    }
                } else {
                    // Citar cintilação (twinkle) apenas nas paradas
                    star.alpha += star.twinkleSpeed;
                    if (star.alpha <= 0.1 || star.alpha >= 0.9) {
                        star.twinkleSpeed *= -1;
                    }
                }
            });

            // Desenhar estrelas cadentes (shooting stars)
            for (let i = shootingStars.length - 1; i >= 0; i--) {
                const s = shootingStars[i];
                ctx.globalAlpha = Math.max(0, s.alpha);
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                // Linha transversal caindo
                ctx.moveTo(s.x, s.y);
                ctx.lineTo(s.x - s.length * 0.7, s.y - s.length * 0.7);
                ctx.stroke();

                s.x += s.speedX;
                s.y += s.speedY;
                s.alpha -= 0.02; // Fade out rápido

                if (s.alpha <= 0) {
                    shootingStars.splice(i, 1);
                }
            }

            ctx.globalAlpha = 1;
            requestAnimationFrame(drawGalaxy);
        }
        // Ativa Loop
        drawGalaxy();

    </script>
</body>
</html>
